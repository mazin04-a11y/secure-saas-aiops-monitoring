services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://aiops:aiops@postgres:5432/aiops_saas
      APP_ENVIRONMENT: local
      CREWAI_MODE: raw
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      INGEST_API_KEYS: ${INGEST_API_KEYS:-local-dev-ingest-key}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
